agent:
  type: q_learning
  alpha: 0.1
  gamma: 0.99
  epsilon: 1.0
  epsilon_decay: 0.997
  epsilon_min: 0.01

training:
  env: gridworld
  n_episodes: 300
  max_steps: 200
  eval_every: 50
  checkpoint_dir: experiments/results/q_learning_gridworld

logging:
  tensorboard: false
  csv: true

seed: 42
