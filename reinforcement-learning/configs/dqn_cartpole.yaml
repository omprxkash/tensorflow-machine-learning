agent:
  type: dqn
  hidden_dims: [128, 128]
  gamma: 0.99
  lr: 1e-3
  batch_size: 64
  buffer_size: 50000
  target_update_freq: 200
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay_steps: 10000

training:
  env: CartPole-v1
  n_episodes: 200
  max_steps: 500
  eval_every: 50
  checkpoint_dir: experiments/results/dqn_cartpole

logging:
  tensorboard: false
  csv: true

seed: 42
